name: Publish rulesets

on:
  push:
    branches:
      - main
    paths:
      - 'rulesets/**'
      - 'src/**'
      - '**/*.csproj'
      - '**/*.sln'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet dependencies
        run: dotnet restore

      - name: Export rulesets
        run: |
          dotnet run --project ./src/DomainRulesets.ConsoleApp/DomainRulesets.ConsoleApp.csproj -c Release -- \
            -f shadowrocket v2ray \
            -i ./rulesets \
            -o ./release

      - name: Publish rulesets to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release
          publish_branch: release
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Publish rulesets from ${{ github.sha }}"