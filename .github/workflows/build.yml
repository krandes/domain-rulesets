name: Build and Deploy Rulesets

on:
  push:
    branches:
      - main
    paths:
      - 'rulesets/**'
      - 'src/**'
      - '**/*.csproj'
      - '**/*.sln'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Run Builder
        run: |
          dotnet run --project ./src/DomainRulesets.ConsoleApp/DomainRulesets.ConsoleApp.csproj -c Release -- \
            -f shadowrocket v2ray \
            -i ./rulesets \
            -o ./release

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release
          publish_branch: release
          force_push: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Build rulesets: ${{ github.sha }}"